<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Token Extractor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
        }

        .extract-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .extract-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .extract-btn:active {
            transform: translateY(0);
        }

        .extract-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .extract-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease-out;
        }

        .result-item.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .result-item.error {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .token-display {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 10px 0;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .status i {
            font-size: 16px;
        }

        .clear-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Token Extractor</h1>
            <p>Enter C_user cookie to extract EAAD6V7 token</p>
        </div>

        <div class="input-group">
            <i class="fas fa-cookie-bite"></i>
            <input type="text" id="cUser" placeholder="Paste C_user cookie value here..." />
        </div>

        <button class="extract-btn" id="extractBtn">
            <i class="fas fa-magic"></i> Extract EAAD6V7 Token
        </button>

        <div class="results" id="results"></div>
    </div>

    <script>
        const extractBtn = document.getElementById('extractBtn');
        const cUserInput = document.getElementById('cUser');
        const resultsDiv = document.getElementById('results');

        extractBtn.addEventListener('click', async () => {
            const cUser = cUserInput.value.trim();
            
            if (!cUser) {
                alert('Please enter C_user cookie');
                return;
            }

            extractBtn.classList.add('loading');
            extractBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Extracting...';

            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({c_user: cUser})
                });

                const data = await response.json();
                
                displayResult(data);
            } catch (error) {
                displayResult({
                    error: 'Connection failed',
                    status: 'error'
                });
            } finally {
                extractBtn.classList.remove('loading');
                extractBtn.innerHTML = '<i class="fas fa-magic"></i> Extract EAAD6V7 Token';
            }
        });

        function displayResult(data) {
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-item ${data.status || 'error'}`;
            
            let content = `
                <div class="status">
                    <i class="fas fa-${data.status === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                    <span>${data.status?.toUpperCase() || 'ERROR'}</span>
                </div>
                <div>C_user: <span class="token-display">${data.c_user || data.error}</span></div>
            `;
            
            if (data.eaad_token) {
                content += `<div>EAAD6V7: <span class="token-display">${data.eaad_token}</span></div>`;
            }
            
            if (data.timestamp) {
                content += `<div style="font-size: 12px; opacity: 0.9;">${data.timestamp}</div>`;
            }
            
            content += `
                <button class="clear-btn" onclick="this.parentElement.remove()">
                    <i class="fas fa-trash"></i> Remove
                </button>
            `;
            
            resultDiv.innerHTML = content;
            resultsDiv.insertBefore(resultDiv, resultsDiv.firstChild);
        }
    </script>
</body>
  </html>
